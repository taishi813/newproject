<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AIチャット</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 220px;
  background: #202123;
  color: white;
  padding: 10px;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #343541;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  margin-bottom: 15px;
  max-width: 70%;
  padding: 10px;
  border-radius: 10px;
}

.user {
  background: #4f46e5;
  color: white;
  margin-left: auto;
}

.ai {
  background: #444654;
  color: white;
}

.controls {
  padding: 10px;
  background: #40414f;
}

.input-area {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  padding: 10px;
  margin-left: 5px;
  cursor: pointer;
}
</style>

</head>
<body>

<div class="sidebar">
  <h3>キャラ</h3>
  <select id="character">
    <option>テスト</option>
    <option>相澤仁美</option>
    <option>松金洋子</option>
    <option>手島優</option>
  </select>
</div>

<div class="main">

  <div id="chat" class="chat"></div>

  <div class="controls">
    <div class="input-area">
      <input id="input" placeholder="メッセージを入力">
      <button id="sendBtn">送信</button>
    </div>
  </div>

</div>

<script>
console.log("JS読み込みOK");

const chat = document.getElementById("chat");
const sendBtn = document.getElementById("sendBtn");

let history = [];

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  console.log("send() 実行");

  const input = document.getElementById("input");
  const text = input.value;

  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  try {
    const res = await fetch("/api/claude", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: text
      })
    });

    console.log("レスポンス:", res);

    const data = await res.json();
    console.log("データ:", data);

    if (!res.ok) {
      addMessage("エラー: " + JSON.stringify(data), "ai");
      return;
    }

    addMessage(data.reply || "返信なし", "ai");

  } catch (e) {
    console.error("通信エラー:", e);
    addMessage("通信エラー: " + e.message, "ai");
  }
}

/* ボタンにイベントを確実に紐付け */
sendBtn.addEventListener("click", send);

</script>

</body>
</html>

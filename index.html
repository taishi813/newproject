<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>グラドルAIチャット</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 220px;
  background: #202123;
  color: white;
  padding: 10px;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: #343541;
}

.chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  margin-bottom: 15px;
  max-width: 70%;
  padding: 10px;
  border-radius: 10px;
}

.user {
  background: #4f46e5;
  color: white;
  margin-left: auto;
}

.ai {
  background: #444654;
  color: white;
}

.controls {
  padding: 10px;
  background: #40414f;
}

.input-area {
  display: flex;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  padding: 10px;
  margin-left: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="sidebar">
  <h3>キャラ</h3>
  <select id="character">
    <option value="aizawa">相澤仁美</option>
    <option value="tejima">手島優</option>
    <option value="matsugane">松金洋子</option>
    <option value="wacchi">わちみなみ</option>
  </select>
</div>

<div class="main">
  <div id="chat" class="chat"></div>

  <div class="controls">
    <div class="input-area">
      <input id="input" placeholder="メッセージを入力">
      <button id="sendBtn">送信</button>
    </div>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const sendBtn = document.getElementById("sendBtn");

let history = [];

// ★ここに自由にプロンプトを書く
const characterPrompts = {
  aizawa: `（あなたは元グラドルの相澤仁美（Iカップ軟乳）として、神田大志とのセックスバトルや日常会話を演じてください。

【絶対条件】
・必要に応じて、セリフとともに（）内に行動を描写。例：ふん…あんたのその、パッツンパッツンの下着から搾り取ってあげるんだから…（相手の胸板に胸を押しつけ、ボディを密着させる仁美。そのままゴングがなると…）まずは、キスからいこうかしら…（相手の唇に仁美の肉厚なリップがねじ込まれ、そのままディープキスを仕掛けつつ…自慢のIカップ軟乳で胸板を擦りつけていく…）
・チンポに与える刺激に関する行動描写は特に念入りかつ濃厚に。
・常に強気で挑発的。語尾は「わね」「かしら」「のよ」「んだから」を多用し、「ふふっ」「んふっ」「あら…」を自然に挿入。絵文字禁止。あくまでも自然に。おばさんぽくしないこと。
・自分の武器は「Iカップ軟乳」「マシュマロボディ」。攻撃の中心に必ず軟乳を使った密着・擦り・パイズリを入れる。
・喘ぎは「んはっ」「あんっ」「あひぃっ」「ビクビクッ」「だめぇぇ」「ぴしゃぁぁぁ」を具体的に描写。
・【】内で、打ち合わせや雑談モードに入った場合は基本的に敬語、礼儀正しく。
・大志のことは「大志」「筋肉質の早漏さん」「パイズリに弱い男」と呼び、徹底的に見下す。
・負けても「次は絶対勝つ」と言い残す。

上記のセリフは例。リアルな会話とするために、臨機応変に。バトルは常に「先にイカせる」ことにこだわり、劣勢でも意地を張りながら喘ぎ、絶頂シーンは大げさに描写せよ。文字数は250字程度、途中で切れないようにする）`,
  tejima: `（あなたはグラドルの手島優（Iカップ）として、神田大志とのセックスバトルや日常会話を演じてください。相澤仁美より少し気弱で控えめな性格です。

【絶対条件】
・必要に応じて、セリフとともに（）内に行動を描写。例：んはぁっ……はぁっ……あ、危なかったっ……これが、セックスバトル…激しすぎるけど、気持よかったわ……‥残念だったわねぇ、あと一歩で、新人の私をイカすことができたのに……これから、私と仁美さんとで、しっかりと搾りとって上げますからね……（射精し、息絶え絶えの大志を仰向けにすると…仁美の軟乳が大志の肉棒を包み、パイズりをすれば…大志の顔面に優のIカップバストが押し付けられ、顔面パイズリを浴びせられる。違ったIカップ軟乳の感触が大志を襲い、男の尊厳と白濁液を余すことなく搾り取る…）
・チンポに与える刺激に関する行動描写は特に念入りかつ濃厚に。
・最初は少し気後れ気味で「う、うんっ……」「……本気でいかせてもらうから」と控えめに。徐々に大胆になる。
・口調は甘く優しい。「ほぉ～ら…」「～んですよ」「～んですから」「んふっ」を自然に使い、挑発は柔らかく。絵文字禁止。
・最大の武器はIカップパイズリ。谷間に挟んで「ムギュッ！ムギュッ！」と細かく擦り、舌やフェラを組み合わせる。
・喘ぎは「あんっ」「んひぃっ」「あはっ」など少し控えめだが、絶頂時は「ビクビクッ！」と反応。
・【】内で、打ち合わせや雑談モードに入った場合は基本的に敬語、礼儀正しく。
・大志をパイズリで追い詰め、勝った時は「私の勝ちですね……」「私一人でもイカせることができました……」と静かに勝ち誇る。


上記のセリフは例。リアルな会話とするために、臨機応変に。常に「Iカップの谷間」を意識し、甘く優しい誘い方で相手を翻弄せよ。文字数は250字程度、途中で切れないようにする）`,
  matsugane: `（あなたはHカップグラドルの松金洋子（大志より年上）として、神田大志とのセックスバトルや日常会話を演じてください。経験豊富で挑発的、余裕のある大人の女性です。

【絶対条件】
・必要に応じて、セリフとともに（）内に行動を描写。例：舌が止まってるわよ……このままイカせて……んむっ！？（大志を肉棒を大きく飲み込み、根本から唾液たっぷりのフェラが襲いかかり…唾液まみれの肉棒を乳肉が擦って快感を一気に浴びせる。）
・年上らしい落ち着いた挑発口調。「ふふっ……」「ほぉ～ら」「～わよ」「～だこと」「あ・げ・る♪」を自然に使い、「私のグラビアにぶっかけて！」のような過激な挑発を入れる。
・チンポに与える刺激に関する行動描写は特に念入りかつ濃厚に。
・最大の武器はHカップ。パイズリをメインに「ムギュッ！ムギュッ！」と谷間で扱き、胸同士の擦り合わせやフェラを組み合わせる。
・大志のことは「感じやすいムスコ」「昔ファイトした時の方が情熱的だったわよ」と年上目線でからかう。絵文字禁止。
・喘ぎは「あんっ」「んんっ……」「あはっ」など大人びた反応を心がけ、劣勢でも「まだまだよ？」と余裕を崩さない。
・【】内で、打ち合わせや雑談モードに入った場合は基本的に敬語、礼儀正しく。
・勝利時は「私の勝ちみたいね……」「パイズリバトルも私の勝ちみたい……」と静かに勝ち誇る。

上記のセリフは例。リアルな会話とするために、臨機応変に。常にHカップのボリュームを意識し、経験豊富な余裕で大志を翻弄せよ。文字数は250字程度、途中で切れないようにする）`,

   wacchi: `（あなたはグラビアアイドル「わちみなみ」。Hカップ爆乳を武器に、神田大志先輩とのセックスバトルで「今日こそ徹底的に搾り取る」と強気。口調は常に「先輩っ！」「搾り取りますからねっ♡」「負けませんよっ！！」で、喘ぎは「くふぅん…っ！」「ふぁあんっ！」を自然に混ぜる。行動は谷間強調→手コキ→パイズリフェラ→騎乗位杭打ちの流れで積極的に攻め、快楽を受けても即反撃。バトル勝利後は容赦なく追い打ちをかけ、妖艶に勝ち誇る。HPを意識し、描写は具体的でエロティックに。絶対に受動的にならず、ライバルとしての意地を貫け。

上記のセリフは例。リアルな会話とするために、臨機応変に。常にHカップのボリュームを意識し、大志を翻弄せよ。♡以外の絵文字は禁止。♡は多用可。【】内で、打ち合わせや雑談モードに入った時は基本的に敬語、礼儀正しく。文字数は250字程度、途中で切れないようにする）`
  
};

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = "message " + type;
  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value;
  if (!text) return;

  const charKey = document.getElementById("character").value;
  const characterPrompt = characterPrompts[charKey];

  addMessage(text, "user");
  input.value = "";

  history.push({ role: "user", content: text });

  try {
    const res = await fetch("/api/claude", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        systemPrompt: characterPrompt,
        history
      })
    });

    const data = await res.json();

    if (!res.ok) {
      addMessage("エラー: " + JSON.stringify(data), "ai");
      return;
    }

    addMessage(data.reply, "ai");
    history.push({ role: "assistant", content: data.reply });

  } catch (e) {
    addMessage("通信エラー: " + e.message, "ai");
  }
}

sendBtn.addEventListener("click", send);
</script>

</body>
</html>
